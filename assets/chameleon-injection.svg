<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470" xml:space="preserve" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="chameleon injecting real pre-edit context captured from the PreToolUse hook: the resolved archetype, a canonical witness file from the repo, a taught team idiom, and a do-not-write-it-this-way axios counterexample">
  <style>
    .win { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .bar { fill: #0d1117; }
    text { font-size: 13px; }
    .cm  { fill: #8b949e; }
    .mut { fill: #768390; }
    .fg  { fill: #c9d1d9; }
    .kw  { fill: #ff7b72; }
    .str { fill: #a5d6ff; }
    .acc { fill: #7ee787; font-weight: 600; }
    .warn{ fill: #e3b341; }
    .ok  { fill: #56d364; font-weight: 600; }
    .ttl { fill: #768390; font-size: 12px; }
    .l   { opacity: 1; animation: flow 13s ease infinite backwards; }
    .d0{animation-delay:.4s}.d1{animation-delay:.9s}.d2{animation-delay:1.5s}
    .d3{animation-delay:2.0s}.d4{animation-delay:2.5s}.d5{animation-delay:3.0s}
    .d6{animation-delay:3.7s}.d7{animation-delay:4.2s}.d8{animation-delay:5.0s}
    .d9{animation-delay:5.5s}.d10{animation-delay:6.3s}
    @keyframes flow {
      0%   { opacity: 0; transform: translateY(7px); }
      3%   { opacity: 1; transform: translateY(0); }
      72%  { opacity: 1; transform: translateY(0); }
      82%  { opacity: 0; transform: translateY(0); }
      100% { opacity: 0; }
    }
    .cur { fill: #7ee787; animation: blink 1.05s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .l { opacity: 1; animation: none; }
      .cur { animation: none; }
    }
  </style>

  <rect class="win" x="1" y="1" width="758" height="468" rx="10"/>
  <rect class="bar" x="1" y="1" width="758" height="34" rx="10"/>
  <rect class="bar" x="1" y="20" width="758" height="15"/>
  <circle cx="22" cy="18" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="5" fill="#ffbd2e"/>
  <circle cx="58" cy="18" r="5" fill="#27c93f"/>
  <text class="ttl" x="380" y="22" text-anchor="middle">chameleon  ·  PreToolUse (Edit / Write)  ·  real capture</text>

  <text class="l d0 cm"  x="26" y="70"># you start editing  src/pages/MakeOffers/index.tsx</text>

  <text class="l d1" x="26" y="104"><tspan class="acc">🦎 chameleon</tspan><tspan class="mut">   archetype=</tspan><tspan class="fg">pages-component</tspan><tspan class="mut"> · confidence=</tspan><tspan class="fg">medium</tspan><tspan class="mut"> · match_quality=</tspan><tspan class="fg">ast</tspan></text>

  <text class="l d2 mut" x="26" y="142">Canonical witness  ·  how this archetype is written here</text>
  <text class="l d3" x="26" y="168"><tspan class="fg">  import { Button, Icon, Loader } from </tspan><tspan class="str">"~/components/base"</tspan></text>
  <text class="l d4" x="26" y="192"><tspan class="kw">  const </tspan><tspan class="fg">Success: React.FC&lt;IProps&gt; = (props) =&gt; { ... }</tspan></text>

  <text class="l d5 mut" x="26" y="230">Team idiom  ·  taught via /chameleon-teach</text>
  <text class="l d6" x="26" y="256"><tspan class="fg">  dialogs → </tspan><tspan class="acc">showAlert()</tspan><tspan class="fg"> from </tspan><tspan class="str">~/hooks/useAlert</tspan><tspan class="mut">  (not window.confirm)</tspan></text>

  <text class="l d7 warn" x="26" y="300">⚠  Known off-pattern in this repo. Do NOT write it this way:</text>
  <text class="l d8" x="26" y="326"><tspan class="kw">     import </tspan><tspan class="fg">axios</tspan><tspan class="kw"> from </tspan><tspan class="str">"axios"</tspan></text>

  <text class="l d9 ok" x="26" y="366">✓  Use @/lib/wrapper instead of axios.</text>
  <text class="l d10 mut" x="26" y="390">   The canonical witness above is the conforming form.</text>

  <rect class="cur" x="26" y="420" width="9" height="16"/>
</svg>
