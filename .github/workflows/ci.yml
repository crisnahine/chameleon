# Continuous integration gates for chameleon.
#
# Fires on every PR (against main) and every push to main. Mirrors the
# local test workflow documented in CONTRIBUTING.md, minus the
# real-Claude-Code acceptance suite (that costs ~$0.20/run and lives in
# real-claude-code-acceptance.yml — manual / cron only).
#
# Jobs:
#   - test-python:      matrix on Python 3.11-3.13 across Ubuntu + macOS.
#                        Runs unit tests + harness library tests.
#   - test-windows:     native Windows import smoke + the cross-platform locking
#                        tests (validates the fcntl/msvcrt + O_NOFOLLOW guards on
#                        the one platform where the no-fcntl branch actually runs).
#   - runtime-windows:  drives the hook stack (run-hook.cmd -> Git Bash -> venv
#                        python) and a bootstrap/trust/refresh lifecycle on real
#                        Windows -- the full runtime the import smoke can't cover.
#   - lint:             ruff check + ruff format --check on MCP package +
#                        unit tests + journey tests.
#   - version-sync:     bash scripts/bump-version.sh --check (fails CI on drift).
#   - no-personal-paths: fails CI if a tracked file hardcodes a developer
#                        home path (/Users/<name> or /home/<name>).
#   - hook-smoke:       matrix over all 5 hooks with synthetic stdin,
#                        asserting each emits valid JSON.
#   - security:         pip-audit + npm audit on dependencies.
#   - shellcheck:       static analysis on hook scripts + shell scripts.
#   - hooks-manifest:   validates hooks.json references + skill directories.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-python:
    name: test-python (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mcp/package-lock.json'

      - name: Set up Ruby (Ruby extractor golden corpus)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'  # 3.3+ bundles prism

      - name: Install Python dependencies (uv sync)
        working-directory: mcp
        run: uv sync --frozen --extra dev

      - name: Install Node dependencies (TypeScript extractor)
        working-directory: mcp
        run: npm ci

      - name: Sanity-check the MCP server imports
        working-directory: mcp
        run: .venv/bin/python -c "from chameleon_mcp.server import mcp; print('mcp ok')"

      - name: Run unit + harness tests
        working-directory: mcp
        env:
          PYTHONPATH: '.:..'
        run: .venv/bin/python -m pytest ../tests/unit/ ../tests/journey/harness/tests/ ../tests/effectiveness/tests/ -v

  test-windows:
    name: test-windows (py${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Install Python dependencies (uv sync)
        working-directory: mcp
        run: uv sync --frozen --extra dev

      # The whole point of this job: native Windows has no fcntl, so this import
      # would crash before the cross-platform locking layer landed. No Node/Ruby
      # here -- the extractors aren't exercised by the import smoke or lock tests.
      - name: Import smoke (no fcntl on this platform)
        working-directory: mcp
        run: uv run python -c "from chameleon_mcp.server import mcp; print('mcp imports on Windows')"

      # Runs the simulated branch tests AND the win32-only tests that exercise the
      # real msvcrt / ctypes OpenProcess paths (skipped everywhere else).
      - name: Cross-platform locking tests
        working-directory: mcp
        env:
          PYTHONPATH: '.;..'
        run: uv run python -m pytest ../tests/unit/test_locks_cross_platform.py -v

  runtime-windows:
    name: runtime-windows (hooks + lifecycle)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Set up Node.js (bootstrap's TypeScript extractor)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mcp/package-lock.json'

      - name: Install Python dependencies (uv sync)
        working-directory: mcp
        run: uv sync --frozen --extra dev

      - name: Install Node dependencies (TypeScript extractor)
        working-directory: mcp
        run: npm ci

      # Drives run-hook.cmd -> Git Bash -> venv python for every hook (asserting
      # the error log records no python-spawn failure), then a real bootstrap ->
      # trust -> refresh against a throwaway repo. The whole point is the native
      # Windows runtime that import + unit tests can't exercise.
      - name: Hook stack + lifecycle on native Windows
        working-directory: mcp
        run: uv run python ../tests/ci_windows_runtime.py

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Ruff check (MCP package + tests)
        working-directory: mcp
        # Use uvx so we don't need a full `uv sync` just to lint. Ruff
        # config (line-length, target-version, select) lives in
        # mcp/pyproject.toml -- uvx picks it up from the working directory.
        run: uvx ruff@0.15.13 check chameleon_mcp/ ../tests/unit/ ../tests/journey/

      - name: Ruff format check (MCP package + tests)
        working-directory: mcp
        # Formatter gate, same scope and pinned version as the check above
        # so the local venv (uv.lock pins ruff 0.15.13) and CI agree
        # byte-for-byte. Run `uvx ruff@0.15.13 format chameleon_mcp/ ../tests/`
        # to fix locally.
        run: uvx ruff@0.15.13 format --check chameleon_mcp/ ../tests/unit/ ../tests/journey/

  version-sync:
    name: version-sync (bump-version.sh --check)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Verify all 6 manifests agree on the version
        run: bash scripts/bump-version.sh --check

  no-personal-paths:
    name: no-personal-paths
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fail on hardcoded developer home paths
        run: bash scripts/check-no-personal-paths.sh

  hook-smoke:
    name: hook-smoke (${{ matrix.hook.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        hook:
          - name: session-start
            stdin: '{"session_id":"ci-smoke","hook_event_name":"SessionStart"}'
          - name: preflight-and-advise
            stdin: '{"tool_name":"Edit","tool_input":{"file_path":"/tmp/test.ts"},"session_id":"ci-test"}'
          - name: posttool-recorder
            stdin: '{"tool_name":"Bash","tool_input":{"command":"echo hi"},"tool_response":{"stdout":"hi"},"session_id":"ci-test"}'
          - name: posttool-verify
            stdin: '{"tool_name":"Edit","tool_input":{"file_path":"/tmp/test.ts"},"tool_response":{"content":"const x = 1;","success":true},"session_id":"ci-test"}'
          - name: callout-detector
            stdin: '{"user_prompt":"hello world","session_id":"ci-test"}'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Install Python dependencies (uv sync)
        working-directory: mcp
        run: uv sync --frozen

      - name: Invoke hooks/${{ matrix.hook.name }} with synthetic stdin
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}
        run: |
          echo '${{ matrix.hook.stdin }}' \
            | hooks/${{ matrix.hook.name }} \
            | python3 -c "import json,sys; obj=json.loads(sys.stdin.read(), strict=False); assert isinstance(obj, dict), f'expected dict, got {type(obj).__name__}'; print('hook emitted valid JSON object')"

  security:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pip-audit
        working-directory: mcp
        run: |
          # pip-audit audits the environment of the interpreter it runs under.
          # Under `pipx run` that is pipx's own throwaway venv — seeded with the
          # runner's bundled pip — so the project deps were never audited and a
          # one-patch-stale runner pip (PYSEC-2026-196 on 26.1.1) failed every
          # commit. Install pip-audit into the project env instead, with pip
          # upgraded first so the audited environment carries a patched pip.
          python -m pip install -q --upgrade pip
          pip install -q -e ".[dev]" pip-audit
          pip-audit --desc on --progress-spinner off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit
        working-directory: mcp
        run: npm ci --ignore-scripts && npm audit --audit-level=high

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint hook scripts
        run: shellcheck -S warning hooks/_resolve-python.sh hooks/session-start hooks/preflight-and-advise hooks/posttool-recorder hooks/posttool-verify hooks/callout-detector hooks/stop-backstop scripts/*.sh

  hooks-manifest:
    name: hooks-manifest-check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate hooks.json references
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          errors = 0
          with open('hooks/hooks.json') as f:
              manifest = json.load(f)
          for event, entries in manifest.get('hooks', {}).items():
              for entry in entries:
                  for hook in entry.get('hooks', []):
                      cmd = hook.get('command', '')
                      name = cmd.split()[-1] if cmd else ''
                      path = 'hooks/' + name
                      if name and not os.path.isfile(path):
                          print(f'ERROR: {path} missing'); errors += 1
                      elif name and not os.access(path, os.X_OK):
                          print(f'ERROR: {path} not executable'); errors += 1
          for d in os.listdir('skills'):
              sd = os.path.join('skills', d)
              if os.path.isdir(sd) and not os.path.isfile(os.path.join(sd, 'SKILL.md')):
                  print(f'ERROR: {sd}/ missing SKILL.md'); errors += 1
          print(f'Checked hooks + skills: {errors} error(s)')
          sys.exit(1 if errors else 0)
          PYEOF
