# Continuous integration gates for chameleon.
#
# Fires on every PR (against main) and every push to main. Mirrors the
# local test workflow documented in CONTRIBUTING.md, minus the
# real-Claude-Code acceptance suite (that costs ~$0.20/run and lives in
# real-claude-code-acceptance.yml — manual / cron only).
#
# Jobs:
#   - test-python:      matrix on Python 3.11-3.13 across Ubuntu + macOS.
#                        Runs unit tests + harness library tests.
#   - lint:             ruff check on MCP package + unit tests + journey tests.
#   - version-sync:     bash scripts/bump-version.sh --check (fails CI on drift).
#   - no-personal-paths: fails CI if a tracked file hardcodes a developer
#                        home path (/Users/<name> or /home/<name>).
#   - hook-smoke:       matrix over all 5 hooks with synthetic stdin,
#                        asserting each emits valid JSON.
#   - security:         pip-audit + npm audit on dependencies.
#   - shellcheck:       static analysis on hook scripts + shell scripts.
#   - hooks-manifest:   validates hooks.json references + skill directories.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-python:
    name: test-python (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mcp/package-lock.json'

      - name: Install Python dependencies (uv sync)
        working-directory: mcp
        run: uv sync --frozen --extra dev

      - name: Install Node dependencies (TypeScript extractor)
        working-directory: mcp
        run: npm ci

      - name: Sanity-check the MCP server imports
        working-directory: mcp
        run: .venv/bin/python -c "from chameleon_mcp.server import mcp; print('mcp ok')"

      - name: Run unit + harness tests
        working-directory: mcp
        env:
          PYTHONPATH: '.:..'
        run: .venv/bin/python -m pytest ../tests/unit/ ../tests/journey/harness/tests/ -v

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Ruff check (MCP package + tests)
        working-directory: mcp
        # Use uvx so we don't need a full `uv sync` just to lint. Ruff
        # config (line-length, target-version, select) lives in
        # mcp/pyproject.toml -- uvx picks it up from the working directory.
        run: uvx ruff@0.15.13 check chameleon_mcp/ ../tests/unit/ ../tests/journey/

  version-sync:
    name: version-sync (bump-version.sh --check)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Verify all 9 manifests agree on the version
        run: bash scripts/bump-version.sh --check

  no-personal-paths:
    name: no-personal-paths
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fail on hardcoded developer home paths
        run: bash scripts/check-no-personal-paths.sh

  hook-smoke:
    name: hook-smoke (${{ matrix.hook.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        hook:
          - name: session-start
            stdin: '{"session_id":"ci-smoke","hook_event_name":"SessionStart"}'
          - name: preflight-and-advise
            stdin: '{"tool_name":"Edit","tool_input":{"file_path":"/tmp/test.ts"},"session_id":"ci-test"}'
          - name: posttool-recorder
            stdin: '{"tool_name":"Bash","tool_input":{"command":"echo hi"},"tool_response":{"stdout":"hi"},"session_id":"ci-test"}'
          - name: posttool-verify
            stdin: '{"tool_name":"Edit","tool_input":{"file_path":"/tmp/test.ts"},"tool_response":{"content":"const x = 1;","success":true},"session_id":"ci-test"}'
          - name: callout-detector
            stdin: '{"user_prompt":"hello world","session_id":"ci-test"}'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: 'mcp/uv.lock'

      - name: Install Python dependencies (uv sync)
        working-directory: mcp
        run: uv sync --frozen

      - name: Invoke hooks/${{ matrix.hook.name }} with synthetic stdin
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}
        run: |
          echo '${{ matrix.hook.stdin }}' \
            | hooks/${{ matrix.hook.name }} \
            | python3 -c "import json,sys; obj=json.loads(sys.stdin.read(), strict=False); assert isinstance(obj, dict), f'expected dict, got {type(obj).__name__}'; print('hook emitted valid JSON object')"

  security:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pip-audit
        run: pipx run pip-audit -r mcp/pyproject.toml --desc on --progress-spinner off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit
        working-directory: mcp
        run: npm ci --ignore-scripts && npm audit --audit-level=high

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint hook scripts
        run: shellcheck -S warning hooks/session-start hooks/preflight-and-advise hooks/posttool-recorder hooks/posttool-verify hooks/callout-detector scripts/*.sh

  hooks-manifest:
    name: hooks-manifest-check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate hooks.json references
        run: |
          python3 -c "
          import json, sys, os
          with open('hooks/hooks.json') as f:
              manifest = json.load(f)
          errors = 0
          for event, entries in manifest.get('hooks', {}).items():
              for entry in entries:
                  for hook in entry.get('hooks', []):
                      cmd = hook.get('command', '')
                      script_name = cmd.split()[-1] if cmd else ''
                      script_path = 'hooks/' + script_name
                      if script_name and not os.path.isfile(script_path):
                          print(f'ERROR: {script_path} referenced in hooks.json but missing')
                  errors += 1
              elif not os.access(script, os.X_OK):
                  print(f'ERROR: {script} not executable')
                  errors += 1
          for d in os.listdir('skills'):
              skill_dir = os.path.join('skills', d)
              if os.path.isdir(skill_dir):
                  skill_md = os.path.join(skill_dir, 'SKILL.md')
                  if not os.path.isfile(skill_md):
                      print(f'ERROR: {skill_dir}/ missing SKILL.md')
                      errors += 1
          sys.exit(1 if errors else 0)
          "
