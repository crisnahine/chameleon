plugins:
  - rubocop-rspec
  - rubocop-rails

require:
  - ./lib/rubocop/custom_cops/sleep_without_unless_test.rb

AllCops:
  DisabledByDefault: false
  NewCops: enable
  UseCache: true
  SuggestExtensions: false
  Exclude:
    - "bin/**/*"
    - "config/**/*"
    - "db/migrate/*"

Style/StringLiterals:
  EnforcedStyle: single_quotes

Layout/LineLength:
  Max: 120
